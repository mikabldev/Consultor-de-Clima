<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌤️ Consultor Avanzado de Clima</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .app-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: clamp(24px, 5vw, 48px);
            margin-bottom: 8px;
            font-weight: 700;
        }

        header p {
            font-size: clamp(12px, 3vw, 16px);
            opacity: 0.95;
        }

        /* TAB NAVIGATION */
        .tab-navigation {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            background: white;
            padding: 12px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            flex-wrap: wrap;
            justify-content: center;
        }

        .tab-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            background: #f8f9fa;
            color: #333;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 14px;
            white-space: nowrap;
        }

        .tab-btn:hover {
            background: #e0e0e0;
            transform: translateY(-2px);
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        /* TAB CONTENT */
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* MAIN CONTAINER */
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            padding: 32px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 16px;
            }
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #312c2c;
            font-weight: 600;
            font-size: 14px;
        }

        input, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s, box-shadow 0.3s;
            font-family: inherit;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button.search-btn, button.clear-btn {
            width: 100%;
            padding: 14px 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 12px;
        }

        button.search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        button.search-btn:active {
            transform: translateY(0);
        }

        button.search-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        button.clear-btn {
            background: #ff9800;
            margin-top: 8px;
        }

        button.clear-btn:hover {
            background: #e67e22;
        }

        /* QUICK BUTTONS */
        .quick-search {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }

        .quick-search h3 {
            font-size: 14px;
            color: #5b4d4d;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .quick-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 8px;
        }

        .quick-btn {
            padding: 10px 12px;
            background: #f8f9fa;
            color: #333;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .quick-btn:hover {
            background: #e0e0e0;
            transform: translateY(-1px);
        }

        /* RESULTS GRID */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .weather-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            padding: 24px;
            color: white;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .weather-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
        }

        /* Colores dinámicos según clima */
        .weather-card.clear {
            background: linear-gradient(135deg, #FFB347 0%, #FF8C00 100%);
        }

        .weather-card.cloudy {
            background: linear-gradient(135deg, #87CEEB 0%, #4A90E2 100%);
        }

        .weather-card.rainy {
            background: linear-gradient(135deg, #4A90E2 0%, #2C3E50 100%);
        }

        .weather-card.snowy {
            background: linear-gradient(135deg, #B0E0E6 0%, #87CEEB 100%);
        }

        .cache-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(255, 255, 255, 0.3);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            backdrop-filter: blur(10px);
        }

        .city-header {
            margin-bottom: 16px;
        }

        .city-name {
            font-size: clamp(20px, 4vw, 28px);
            font-weight: 700;
            margin-bottom: 4px;
        }

        .weather-main {
            font-size: 18px;
            opacity: 0.95;
            margin-bottom: 16px;
        }

        .temp-display {
            font-size: clamp(32px, 8vw, 52px);
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -1px;
        }

        .weather-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            font-size: 14px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.3);
        }

        .detail-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .detail-label {
            opacity: 0.85;
            font-size: 12px;
        }

        .detail-value {
            font-weight: 600;
            font-size: 16px;
        }

        /* FORECAST CARDS */
        .forecast-section {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #e0e0e0;
        }

        .forecast-title {
            font-size: 18px;
            font-weight: 700;
            color: #f8f9fa;
            margin-bottom: 16px;
        }

        .forecast-scroll {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 12px;
        }

        .forecast-day {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 12px;
            text-align: center;
            font-size: 13px;
            flex-shrink: 0;
            min-width: 100px;
            border: 1px solid #e0e0e0;
            transition: all 0.2s;
        }

        .forecast-day:hover {
            background: #e0e0e0;
            transform: translateY(-2px);
        }

        .forecast-day-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
        }

        .forecast-day-date {
            font-size: 11px;
            color: #666;
            margin-bottom: 8px;
        }

        .forecast-temps {
            margin: 8px 0;
            font-weight: 600;
        }

        .forecast-max {
            color: #ff6b6b;
        }

        .forecast-min {
            color: #4ecdc4;
        }

        .forecast-weather {
            font-size: 12px;
            color: #666;
            margin-top: 6px;
        }

        .forecast-rain {
            font-size: 11px;
            color: #667eea;
            margin-top: 4px;
        }

        /* COMPARISON TABLE */
        .comparison-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 14px;
        }

        .comparison-table th {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 16px;
            text-align: left;
            font-weight: 600;
            border: none;
        }

        .comparison-table td {
            padding: 16px;
            border-bottom: 1px solid #e0e0e0;
        }

        .comparison-table tr:hover {
            background: #f8f9fa;
        }

        .comparison-table .temp-high {
            color: #ff6b6b;
            font-weight: 600;
        }

        .comparison-table .temp-low {
            color: #4ecdc4;
            font-weight: 600;
        }

        /* HISTORY */
        .history-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
            margin-top: 20px;
        }

        .history-item {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            font-weight: 500;
        }

        .history-item:hover {
            border-color: #667eea;
            background: white;
            transform: translateY(-2px);
        }

        /* MESSAGES */
        .result-message {
            padding: 16px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
            font-size: 15px;
        }

        .result-message.success {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
            color: #2e7d32;
            display: block;
        }

        .result-message.error {
            background: #ffebee;
            border-left: 4px solid #f44336;
            color: #c62828;
            display: block;
        }

        .result-message.info {
            background: #e3f2fd;
            border-left: 4px solid #667eea;
            color: #1565c0;
            display: block;
        }

        /* LOADING */
        .loading {
            text-align: center;
            padding: 30px;
        }

        .spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid #e0e0e0;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: #666;
            font-weight: 500;
        }

        /* EMPTY STATE */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #666;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .empty-state-text {
            font-size: 16px;
            font-weight: 500;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            header h1 {
                margin-bottom: 4px;
            }

            .container {
                margin-bottom: 20px;
            }

            .results-grid {
                grid-template-columns: 1fr;
            }

            .weather-details {
                grid-template-columns: repeat(2, 1fr);
            }

            .forecast-scroll {
                grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            }

            .comparison-table {
                font-size: 13px;
            }

            .comparison-table th,
            .comparison-table td {
                padding: 12px 8px;
            }

            .tab-navigation {
                gap: 8px;
            }

            .tab-btn {
                padding: 10px 16px;
                font-size: 13px;
            }
        }

        @media (max-width: 480px) {
            header {
                margin-bottom: 20px;
            }

            .container {
                padding: 12px;
                border-radius: 12px;
            }

            .weather-card {
                padding: 16px;
            }

            .temp-display {
                font-size: 40px;
            }

            .city-name {
                font-size: 18px;
            }

            .weather-details {
                gap: 8px;
                margin-top: 12px;
                padding-top: 12px;
            }

            .detail-value {
                font-size: 14px;
            }

            .quick-buttons {
                grid-template-columns: repeat(2, 1fr);
            }

            .comparison-table {
                font-size: 12px;
                display: block;
                overflow-x: auto;
            }

            .comparison-table thead,
            .comparison-table tbody,
            .comparison-table th,
            .comparison-table td,
            .comparison-table tr {
                display: block;
                width: 100%;
            }
        }

        /* TIMESTAMP */
        .timestamp {
            font-size: 12px;
            color: #666;
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
        }

        /* ERROR STATE */
        .error-box {
            background: #ffebee;
            border: 2px solid #f44336;
            border-radius: 8px;
            padding: 16px;
            color: #c62828;
            margin-top: 20px;
        }

        .error-box strong {
            display: block;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- HEADER -->
        <header>
            <h1>🌤️ Consultor de Clima por Ciudad</h1>
            <p>Ingresa una ciudad y obtén datos climáticos actuales junto a un pronóstico</p>
        </header>

        <!-- TAB NAVIGATION -->
        <div class="tab-navigation">
            <button class="tab-btn active" data-tab="search">🔍 Búsqueda Simple</button>
            <button class="tab-btn" data-tab="compare">📊 Comparador por Ciudad</button>
            <button class="tab-btn" data-tab="history">📱 Historial</button>
        </div>

        <!-- TAB 1: BÚSQUEDA SIMPLE -->
        <div id="search" class="tab-content active">
            <div class="container">
                <form id="weatherForm">
                    <div class="form-group">
                        <label for="cityInput">🏙️ Ingresa el nombre de una ciudad:</label>
                        <input 
                            type="text" 
                            id="cityInput" 
                            placeholder="Ej: Madrid, Buenos Aires, Tokyo..."
                            autocomplete="off"
                            required
                        >
                    </div>
                    <button type="submit" class="search-btn">Buscar Clima Actual</button>
                </form>

                <!-- Quick Search -->
                <div class="quick-search">
                    <h3>O elige una ciudad rápidamente:</h3>
                    <div class="quick-buttons">
                        <button class="quick-btn" data-city="Madrid">🇪🇸 Madrid</button>
                        <button class="quick-btn" data-city="Buenos Aires">🇦🇷 Buenos Aires</button>
                        <button class="quick-btn" data-city="Tokyo">🇯🇵 Tokio</button>
                        <button class="quick-btn" data-city="Sydney">🇦🇺 Sydney</button>
                        <button class="quick-btn" data-city="París">🇫🇷 París</button>
                        <button class="quick-btn" data-city="Nueva York">🇺🇸 Nueva York</button>
                    </div>
                </div>
            </div>

            <!-- Results for single city search -->
            <div id="searchResults"></div>
        </div>

        <!-- TAB 2: COMPARADOR -->
        <div id="compare" class="tab-content">
            <div class="container">
                <form id="compareForm">
                    <div class="form-group">
                        <label for="citiesInput">🌍 Ingresa múltiples ciudades (separadas por comas):</label>
                        <textarea 
                            id="citiesInput" 
                            placeholder="Ej: Madrid, Paris, London, Tokyo..."
                            autocomplete="off"
                        ></textarea>
                    </div>
                    <button type="submit" class="search-btn">Comparar Ciudades</button>
                </form>
            </div>

            <!-- Comparison Results -->
            <div id="compareResults"></div>
        </div>

        <!-- TAB 3: HISTORIAL -->
        <div id="history" class="tab-content">
            <div class="container">
                <h2 style="margin-bottom: 16px;">📱 Últimas Búsquedas</h2>
                <div id="historyContainer" class="empty-state">
                    <div class="empty-state-icon">🕐</div>
                    <div class="empty-state-text">No hay búsquedas anteriores</div>
                </div>
                <button class="clear-btn" id="clearCacheBtn">🗑️ Limpiar Caché Completo</button>
            </div>
        </div>
    </div>

    <script src="src/js/security-utils.js"></script>
    <script src="src/js/script.js"></script>
    <script>
        // ============================================
        // UI LOGIC - FASES 4, 5, 6
        // ============================================

        const weatherForm = document.getElementById('weatherForm');
        const cityInput = document.getElementById('cityInput');
        const compareForm = document.getElementById('compareForm');
        const citiesInput = document.getElementById('citiesInput');

        // TAB SWITCHING
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                // Remove active class from all buttons and tabs
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));

                // Add active to clicked button and corresponding tab
                const tabName = e.target.getAttribute('data-tab');
                e.target.classList.add('active');
                document.getElementById(tabName).classList.add('active');

                // If history tab, load history
                if (tabName === 'history') {
                    loadHistory();
                }
            });
        });

        // BÚSQUEDA SIMPLE
        weatherForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Validar rate limit
            if (!SecurityUtils.apiRateLimiter.isAllowed()) {
                const status = SecurityUtils.apiRateLimiter.getStatus();
                showMessage(`Demasiadas solicitudes. Espera ${status.resetIn}s`, 'error');
                return;
            }
            
            const city = cityInput.value.trim();
            
            // Validar entrada de usuario
            if (!SecurityUtils.validateCityName(city)) {
                showMessage('Nombre de ciudad inválido. Use solo letras, números y espacios.', 'error');
                SecurityUtils.logSecurityEvent('invalid_city_name', { city });
                return;
            }
            
            await searchCity(city);
        });

        async function searchCity(city) {
            // Doble validación
            if (!city || !SecurityUtils.validateCityName(city)) {
                showMessage('Por favor ingresa un nombre de ciudad válido', 'error');
                return;
            }

            // Rate limiting
            if (!SecurityUtils.apiRateLimiter.isAllowed()) {
                showMessage('Demasiadas solicitudes. Intenta más tarde.', 'error');
                return;
            }

            const resultsDiv = document.getElementById('searchResults');
            resultsDiv.innerHTML = '<div class="container"><div class="loading"><span class="spinner"></span><span class="loading-text">Obteniendo datos climáticos...</span></div></div>';

            const data = await getWeather(city);
            cityInput.value = city;

            if (data.error) {
                // Sanitizar mensaje de error
                const errorMsg = SecurityUtils.sanitizeHTML(data.message);
                const errorBox = document.createElement('div');
                errorBox.className = 'container';
                errorBox.innerHTML = `<div class="error-box"><strong>❌ Error</strong><div>${errorMsg}</div></div>`;
                resultsDiv.innerHTML = '';
                resultsDiv.appendChild(errorBox);
                SecurityUtils.logSecurityEvent('weather_fetch_error', { city, error: data.message });
            } else {
                renderWeatherCard(data, resultsDiv);
            }
        }

        function renderWeatherCard(data, container) {
            const weatherType = getWeatherType(data.weatherCode);
            const cacheLabel = data.fromCache ? '💾 Desde caché' : '';

            let forecastHTML = '';
            
            // Validar y renderizar pronóstico
            if (data.forecast && Array.isArray(data.forecast) && data.forecast.length > 0) {
                console.log(`📅 Renderizando ${data.forecast.length} días de pronóstico`);
                // Usar un contenedor temporal para forecast
                forecastHTML = `
                    <div class="forecast-section">
                        <div class="forecast-title">📅 Pronóstico de los próximos ${data.forecast.length} Días</div>
                        <div class="forecast-scroll" id="forecastScroll"></div>
                    </div>
                `;
            } else {
                console.warn("⚠️ Sin datos de pronóstico para mostrar");
                forecastHTML = `
                    <div class="forecast-section">
                        <div class="forecast-title">📅 Pronóstico</div>
                        <div class="empty-state" style="padding: 20px;">
                            <div style="color: #999;">No hay datos de pronóstico disponibles</div>
                        </div>
                    </div>
                `;
            }

            const html = `
                <div class="results-grid">
                    <div class="weather-card ${weatherType}">
                        ${cacheLabel ? `<div class="cache-badge">${cacheLabel}</div>` : ''}
                        <div class="city-header">
                            <div class="city-name">📍 ${SecurityUtils.sanitizeHTML(data.city)}</div>
                        </div>
                        <div class="weather-main">${SecurityUtils.sanitizeHTML(data.weather)}</div>
                        <div class="temp-display">${Math.round(data.temperature)}°C</div>
                        <div class="weather-details">
                            <div class="detail-item">
                                <span class="detail-label">Sensación Térmica</span>
                                <span class="detail-value">${data.temperature}°C</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">Humedad</span>
                                <span class="detail-value">${data.humidity}%</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">Viento</span>
                                <span class="detail-value">${Math.round(data.windSpeed)} km/h</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">Zona Horaria</span>
                                <span class="detail-value">${SecurityUtils.sanitizeHTML(data.timezone)}</span>
                            </div>
                        </div>
                        <div class="timestamp">⏱️ ${SecurityUtils.sanitizeHTML(data.timestamp)}</div>
                    </div>
                </div>
                ${forecastHTML}
            `;

            container.innerHTML = html;

            // Si hay pronóstico, renderizar usando fragmento DOM para eficiencia
            if (data.forecast && Array.isArray(data.forecast) && data.forecast.length > 0) {
                const forecastScroll = container.querySelector('#forecastScroll');
                if (forecastScroll) {
                    const fragment = document.createDocumentFragment();
                    data.forecast.forEach(day => {
                        const dayDiv = document.createElement('div');
                        dayDiv.className = 'forecast-day';
                        dayDiv.innerHTML = `
                            <div class="forecast-day-name">${SecurityUtils.sanitizeHTML(day.day)}</div>
                            <div class="forecast-day-date">${SecurityUtils.sanitizeHTML(day.dateFormatted)}</div>
                            <div class="forecast-temps">
                                <div class="forecast-max">↑${Math.round(day.tempMax)}°</div>
                                <div class="forecast-min">↓${Math.round(day.tempMin)}°</div>
                            </div>
                            <div class="forecast-weather">${SecurityUtils.sanitizeHTML(day.weather)}</div>
                            ${day.precipitation && day.precipitation > 0 ? `<div class="forecast-rain">🌧️ ${day.precipitation}mm</div>` : ''}
                        `;
                        fragment.appendChild(dayDiv);
                    });
                    forecastScroll.appendChild(fragment);
                }
            }
        }

        function getWeatherType(code) {
            if ([0, 1, 2].includes(code)) return 'clear';
            if ([3, 45, 48].includes(code)) return 'cloudy';
            if ([51, 53, 55, 61, 63, 65, 80, 81, 82].includes(code)) return 'rainy';
            if ([71, 73, 75, 77, 85, 86].includes(code)) return 'snowy';
            return '';
        }

        // COMPARADOR DE CIUDADES
        compareForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Validar rate limit
            if (!SecurityUtils.apiRateLimiter.isAllowed()) {
                showMessage('Demasiadas solicitudes. Intenta más tarde.', 'error');
                return;
            }
            
            const cities = citiesInput.value.trim();
            await compareCities(cities);
        });

        async function compareCities(citiesString) {
            if (!citiesString) {
                showMessage('Por favor ingresa al menos una ciudad', 'error');
                return;
            }

            const resultsDiv = document.getElementById('compareResults');
            resultsDiv.innerHTML = '<div class="container"><div class="loading"><span class="spinner"></span><span class="loading-text">Obteniendo datos para todas las ciudades...</span></div></div>';

            const result = await getWeatherMultiple(citiesString);

            if (!result.success && result.successCount === 0) {
                const errorMsg = SecurityUtils.sanitizeHTML(result.errors[0]?.message || 'No se encontraron datos');
                resultsDiv.innerHTML = `
                    <div class="container">
                        <div class="error-box">
                            <strong>❌ Error</strong>
                            ${errorMsg}
                        </div>
                    </div>
                `;
                return;
            }

            const tableHTML = `
                <div class="container">
                    ${result.errors.length > 0 ? `
                        <div class="result-message error">
                            ⚠️ No se encontraron datos para: ${result.errors.map(e => SecurityUtils.sanitizeHTML(e.city || 'desconocida')).join(', ')}
                        </div>
                    ` : ''}
                    <table class="comparison-table">
                        <thead>
                            <tr>
                                <th>🏙️ Ciudad</th>
                                <th>🌡️ Temperatura</th>
                                <th>☁️ Clima</th>
                                <th>💧 Humedad</th>
                                <th>💨 Viento</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${result.cities.map(city => `
                                <tr>
                                    <td><strong>${SecurityUtils.sanitizeHTML(city.city)}</strong></td>
                                    <td class="temp-high">${Math.round(city.temperature)}°C</td>
                                    <td>${SecurityUtils.sanitizeHTML(city.weather)}</td>
                                    <td>${city.humidity}%</td>
                                    <td>${Math.round(city.windSpeed)} km/h</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                    <div class="result-message info">
                        ✓ Comparación de ${result.successCount} ciudades completada
                    </div>
                </div>
            `;

            resultsDiv.innerHTML = tableHTML;
        }

        // HISTORIAL - Event delegation para evitar XSS
        function loadHistory() {
            const history = getSearchHistory();
            const container = document.getElementById('historyContainer');

            if (history.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🕐</div>
                        <div class="empty-state-text">No hay búsquedas anteriores</div>
                    </div>
                `;
                return;
            }

            // Usar event delegation en lugar de onclick
            const historyList = document.createElement('div');
            historyList.className = 'history-list';
            
            history.forEach(city => {
                const button = document.createElement('button');
                button.className = 'history-item';
                button.setAttribute('data-city', city);
                button.title = city;
                button.textContent = city.length > 12 ? city.substring(0, 10) + '...' : city;
                
                button.addEventListener('click', (e) => {
                    e.preventDefault();
                    searchCity(city);
                });
                
                historyList.appendChild(button);
            });

            container.innerHTML = '';
            container.appendChild(historyList);
        }

        // Event delegation para botones rápidos
        document.addEventListener('click', (e) => {
            if (e.target.classList.contains('quick-btn')) {
                const city = e.target.getAttribute('data-city') || e.target.textContent.replace(/^[🇪🇸🇦🇷🇯🇵🇦🇺🇫🇷🇺🇸]\s/, '');
                if (city) {
                    searchCity(city);
                }
            }
        });

        // Event listener para botón de limpiar caché
        const clearCacheBtn = document.getElementById('clearCacheBtn');
        if (clearCacheBtn) {
            clearCacheBtn.addEventListener('click', clearAllCache);
        }

        // UTILIDADES
        function showMessage(message, type = 'info') {
            const msg = document.createElement('div');
            msg.className = `result-message ${type}`;
            msg.textContent = message;
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 4000);
        }

        function clearAllCache() {
            if (confirm('¿Limpiar todo el caché de clima? No podrás recuperar los datos.')) {
                try {
                    clearExpiredCache();
                    for (let i = localStorage.length - 1; i >= 0; i--) {
                        const key = localStorage.key(i);
                        if (key && key.startsWith('weather_cache_')) {
                            localStorage.removeItem(key);
                        }
                    }
                    showMessage('✓ Caché limpiado completamente', 'success');
                    SecurityUtils.logSecurityEvent('cache_cleared');
                    loadHistory();
                } catch (error) {
                    showMessage('Error al limpiar caché', 'error');
                    SecurityUtils.logSecurityEvent('cache_clear_error', { error: error.message });
                }
            }
        }

        // INICIALIZACIÓN
        document.addEventListener('DOMContentLoaded', () => {
            initCacheSynchronization();
            clearExpiredCache();
            
            // Validar conexión segura en producción
            if (window.location.protocol === 'https:' || window.location.hostname !== 'localhost') {
                console.log('✓ Conexión segura (HTTPS)');
            } else if (window.location.hostname === 'localhost') {
                console.warn('⚠️ En desarrollo. En producción, usar HTTPS.');
            }
        });
    </script>
</body>
</html>
